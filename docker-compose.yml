services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: catavento
      POSTGRES_PASSWORD: catavento
      POSTGRES_DB: catavento_dev
    ports:
      - "5432:5432"
    volumes:
      - catavento_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U catavento -d catavento_dev"]
      interval: 5s
      timeout: 3s
      retries: 5

  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
      target: dev
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://catavento:catavento@postgres:5432/catavento_dev
    ports:
      - "3000:3000"
    volumes:
      - ./apps/server/src:/app/apps/server/src
      - ./packages/db/src:/app/packages/db/src
      - ./packages/db/migrations:/app/packages/db/migrations
      - ./packages/contracts/src:/app/packages/contracts/src
      - catavento_uploads_dev:/app/apps/server/.data/uploads

volumes:
  catavento_pg_data:
  catavento_uploads_dev:
