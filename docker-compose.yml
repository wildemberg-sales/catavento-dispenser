services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: catavento
      POSTGRES_PASSWORD: catavento
      POSTGRES_DB: catavento_dev
    ports:
      - "5432:5432"
    volumes:
      - catavento_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U catavento -d catavento_dev"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  catavento_pg_data:
