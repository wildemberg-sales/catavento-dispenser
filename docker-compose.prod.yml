# Compose de produção — autocontido, pensado para rodar num servidor próprio
# (não depende do docker-compose.yml de dev nem do .env de dev estarem por perto).
#
# Uso:
#   docker compose -f docker-compose.prod.yml --env-file .env.production up -d --build
#
# Migrations não rodam automaticamente no boot — rode manualmente após o primeiro up:
#   docker compose -f docker-compose.prod.yml run --rm server npx tsx ../../packages/db/src/migrate.ts
services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - catavento_pg_data_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 5

  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
      target: prod
    # Nome próprio pra não colidir com a imagem "catavento-server:dev" do
    # docker-compose.yml — ver comentário equivalente lá.
    image: catavento-server:prod
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      PGPOOL_MAX: ${PGPOOL_MAX}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      ACCESS_TOKEN_TTL: ${ACCESS_TOKEN_TTL}
      REFRESH_TOKEN_TTL: ${REFRESH_TOKEN_TTL}
      ABANDONMENT_CHECK_INTERVAL_MS: ${ABANDONMENT_CHECK_INTERVAL_MS}
      ABANDONMENT_TIMEOUT_MINUTES: ${ABANDONMENT_TIMEOUT_MINUTES}
      PORT: 3000
      LOG_LEVEL: ${LOG_LEVEL}
      STORAGE_DRIVER: local
      STORAGE_LOCAL_DIR: /data/uploads
      STORAGE_PUBLIC_BASE_URL: ${STORAGE_PUBLIC_BASE_URL}
      MAX_IMAGE_SIZE_BYTES: ${MAX_IMAGE_SIZE_BYTES}
      MAX_IMAGES_PER_PRODUCT: ${MAX_IMAGES_PER_PRODUCT}
      ANALYTICS_MAX_RANGE_DAYS: ${ANALYTICS_MAX_RANGE_DAYS}
    ports:
      - "3000:3000"
    volumes:
      - catavento_uploads_prod:/data/uploads

volumes:
  catavento_pg_data_prod:
  catavento_uploads_prod:
